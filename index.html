<!DOCTYPE html>
<html lang="es" style="background-color:#06080f">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Focus · Calendario con IA</title>
    <meta name="description" content="Tu calendario con Nova, la IA que propone cambios y nunca toca nada sin tu aprobación." />

    <!-- Iconos -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=2" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Canónica — Vercel deploya tanto www como apex; canonical apunta al
         host oficial para evitar contenido duplicado en buscadores. -->
    <link rel="canonical" href="https://www.usefocus.me/" />

    <!-- Theme colors (claro/oscuro) -->
    <meta name="theme-color" content="#0058bc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#06080f" media="(prefers-color-scheme: dark)" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Focus" />

    <!-- Open Graph (para compartir en redes) -->
    <meta property="og:site_name" content="Focus" />
    <meta property="og:title" content="Focus · Calendario con IA" />
    <meta property="og:description" content="La IA que propone cambios y nunca toca tu calendario sin tu aprobación." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.usefocus.me/" />
    <meta property="og:image" content="https://www.usefocus.me/icons/icon-512.png?v=2" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="es_ES" />

    <!-- Twitter Card — usa la misma og:image como fallback. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Focus · Calendario con IA" />
    <meta name="twitter:description" content="La IA que propone cambios y nunca toca tu calendario sin tu aprobación." />
    <meta name="twitter:image" content="https://www.usefocus.me/icons/icon-512.png?v=2" />

    <!-- Preconnect para Material Symbols (la única fuente externa que sigue
         cargándose). Inter y Manrope se eliminaron — la app usa el stack del
         sistema estilo Notion. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Material Symbols: única fuente externa. Patrón preload→onload para no
         bloquear first paint en iOS standalone. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=block"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=block"
        rel="stylesheet"
      />
    </noscript>

    <style>
      /* Bg base dark — clave para PWA standalone iOS: antes el <body> quedaba
         #fcf8fb por defecto y había un flash blanco entre el splash de iOS y el
         primer render de React. Ahora html/body arrancan oscuros y el salto es
         continuo con el splash del icono. */
      html, body { background-color: #06080f; margin: 0; }

      /* Cinturón de seguridad: mientras Material Symbols no haya cargado,
         ocultamos el texto del span (font-size:0) para que nunca se filtren
         los nombres crudos de iconos ("view_day", "add_a_photo", etc).
         Cuando el JS detecta que la fuente cargó, agrega 'ms-loaded' a <html>
         y los iconos vuelven a su tamaño normal. */
      .material-symbols-outlined { font-size: 0; }
      html.ms-loaded .material-symbols-outlined { font-size: inherit; }

      /* Continuidad landing→app: si llegamos con el flag en sessionStorage,
         el body arranca oscuro para que no haya flash blanco entre la
         landing dark y el threshold scene dark. Se remueve al terminar. */
      html.focus-continuity, html.focus-continuity body { background: #06080f !important; }

      /* Dark boot: cuando arranca la app y todavía va a renderizar un frame
         oscuro encima (onboarding o welcome), mantenemos html/body negros
         hasta que la experiencia inicial termine. Evita el flash blanco de
         1 frame que ocurre entre el unmount del splash inline y el mount
         de React. La clase se añade al vuelo desde el <script> de abajo
         (antes de que React corra) y se remueve desde JS cuando la
         experiencia de bienvenida/onboarding dispara su exit. */
      html.focus-dark-boot, html.focus-dark-boot body { background: #06080f !important; }

      /* ── Instant boot splash ───────────────────────────────────────────────
         HTML+CSS puros dentro de #root. Pinta al instante con el primer parseo
         del HTML, sin depender del bundle JS ni de fuentes externas.

         Diseño: espejamos el threshold scene (WelcomeScreen) para que el
         handoff inline→React sea invisible — el usuario percibe una sola
         pantalla de bienvenida, no dos. Por eso NO hay wordmark grande,
         tagline ni dots: esos elementos no existen en WelcomeScreen. Tiny
         "FOCUS" arriba + orbe central + nada más. Cuando React monta, el
         saludo/hairline/subline fade-in encima sin que nada se mueva. */
      #focus-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at 50% 42%, #0a1226 0%, #06080f 70%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI", system-ui, Roboto, Helvetica, Arial, sans-serif;
        z-index: 0;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        overflow: hidden;
      }
      /* Aurora inline — los mismos blobs que pinta AuroraBackground variant
         "threshold" en WelcomeScreen. Sin esta capa, al montar React los blobs
         aparecían de golpe y el usuario percibía un "cambio" entre el splash
         inline y la pantalla de bienvenida. Mismas dims/colores/blur/fade, y
         los keyframes auroraDrift1/2/3 están en src/index.css — al arrancar
         la animación comienza en translate(0,0), exactamente donde renderiza
         React al montar. Handoff invisible.
         Nota: sin animación aquí a propósito — en HTML puro no cargan las
         @keyframes definidas por el bundle. Los blobs estáticos coinciden
         con el frame 0 de la animación de React; el usuario no alcanza a
         ver la diferencia (~100–200 ms). */
      #focus-splash .aurora {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      #focus-splash .aurora .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
      }
      /* Mismas tonalidades que AuroraBackground variant="threshold":
         tres blobs en familia azul alineados con el icono de la marca
         (#60a5fa → #2563eb → #1d4ed8). Antes b2/b3 eran morado/rosa y
         creaban un degradado violáceo que no concordaba con el icono. */
      #focus-splash .aurora .b1 {
        top: -160px; left: -160px;
        width: 560px; height: 560px;
        background: rgba(96,165,250,0.30);
      }
      #focus-splash .aurora .b2 {
        top: 15%; right: -180px;
        width: 520px; height: 520px;
        background: rgba(37,99,235,0.26);
      }
      #focus-splash .aurora .b3 {
        bottom: 5%; left: 20%;
        width: 480px; height: 480px;
        background: rgba(29,78,216,0.22);
      }
      #focus-splash .aurora .fade {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent 0%, rgba(6,8,15,0.3) 60%, rgba(6,8,15,0.85) 100%);
      }
      #focus-splash .center-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        z-index: 1;
      }
      /* Spacers invisibles que reservan el espacio del greeting + hairline +
         subline del WelcomeScreen. Sin ellos, el orbe del splash quedaría en
         el centro exacto de la pantalla, pero el del WelcomeScreen queda ~60px
         más arriba (porque debajo hay contenido que empuja). Estos placeholders
         hacen que el orbe inline aparezca en la misma posición que cuando React
         renderiza la escena — no hay salto vertical al hacer el handoff. */
      #focus-splash .spacer-greeting { height: 37px; }
      #focus-splash .spacer-hairline { height: 1px; margin-top: 20px; }
      #focus-splash .spacer-subline  { height: 23px; margin-top: 16px; }
      /* Wordmark superior — espeja exactamente el que muestra WelcomeScreen */
      #focus-splash .top-wordmark {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(env(safe-area-inset-top, 0px) + clamp(28px, 6vh, 56px));
        z-index: 1;
        text-align: center;
        font-size: clamp(11px, 1.2vw, 13px);
        letter-spacing: 0.42em;
        font-weight: 500;
        text-transform: uppercase;
        color: rgba(255,255,255,0.55);
        user-select: none;
      }
      /* Icono Focus inline — replica del SVG en /icons/icon.svg con la
         misma paleta azul de marca. Antes había un orbe morado de Nova,
         que era un mismatch visual con el icono de la app. Mostrar el
         icono de la app aquí (mainstream-app pattern, Instagram/Spotify
         enseñan su logo en cold start) hace el handoff splash→React→app
         coherente: el usuario ve siempre el mismo símbolo. */
      #focus-splash .icon-wrap {
        position: relative;
        width: 96px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 36px;
        filter: drop-shadow(0 16px 38px rgba(29,78,216,0.45));
      }
      #focus-splash .icon-wrap svg {
        width: 100%;
        height: 100%;
      }

      /* Señal de vida para cold starts lentos en iPhone. Aparece recién a
         los 2.2s, así que en booteos rápidos (PC, iPhone con bundle
         cacheado) nadie la ve. Ubicada donde WelcomeScreen pinta luego su
         hint "toca para continuar" — misma posición, tamaño y letter-spacing
         → handoff visual continuo si React llega a montar después. */
      #focus-splash .loading-hint {
        position: absolute;
        left: 0;
        right: 0;
        bottom: calc(env(safe-area-inset-bottom, 0px) + clamp(24px, 4vh, 36px));
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.08em;
        color: rgba(255,255,255,0.4);
        opacity: 0;
        animation: focusSplashHint 0.5s ease-out 2.2s forwards;
        user-select: none;
        z-index: 1;
      }
      @keyframes focusSplashHint {
        to { opacity: 0.4; }
      }

      /* Escape hatch cuando el boot pasa los 6 s (red pésima, SW raro,
         bundle parseando lento). Damos al usuario un botón para reintentar
         en vez de dejarlo adivinando si el celular se colgó o no. */
      #focus-splash-reload {
        position: absolute;
        left: 50%;
        bottom: calc(env(safe-area-inset-bottom, 0px) + clamp(60px, 9vh, 90px));
        transform: translateX(-50%);
        display: none;
        padding: 10px 20px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(124,107,255,0.15);
        color: rgba(255,255,255,0.9);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        z-index: 2;
      }
      #focus-splash-reload.show { display: inline-block; animation: focusSplashReload 0.4s ease-out forwards; }
      @keyframes focusSplashReload { from { opacity: 0; transform: translateX(-50%) translateY(6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

      @media (prefers-reduced-motion: reduce) {
        #focus-splash .loading-hint { animation: none; opacity: 0.4; }
      }
    </style>

    <script>
      (function () {
        function reveal() {
          document.documentElement.classList.add('ms-loaded');
        }
        if (typeof document !== 'undefined' && document.fonts && document.fonts.load) {
          document.fonts.load('24px "Material Symbols Outlined"')
            .then(reveal).catch(reveal);
          setTimeout(reveal, 1500);
        } else {
          reveal();
        }
        try {
          var raw = sessionStorage.getItem('focus_aurora_continuity');
          if (raw) {
            var data = JSON.parse(raw);
            if (data && data.t && Date.now() - data.t <= 4000) {
              document.documentElement.classList.add('focus-continuity');
            }
          }
        } catch (_) {}

        // Dark boot guard: si vamos a mostrar onboarding o welcome, mantenemos
        // el body oscuro desde el primer parseo del HTML. Evita el flash blanco
        // entre el splash inline y el primer render de React. Se remueve cuando
        // la experiencia oscura dispara su exit (ver App.jsx / FirstLaunchOnboarding).
        try {
          var onboardingDone = localStorage.getItem('focus_onboarding_completed_v1') === '1';
          var today = new Date().toISOString().slice(0, 10);
          var lastWelcome = localStorage.getItem('focus_welcome_last');
          var welcomePending = lastWelcome !== today;
          if (!onboardingDone || welcomePending) {
            document.documentElement.classList.add('focus-dark-boot');
          }
        } catch (_) {
          // sin storage asumimos primer boot: dark es el default más seguro
          document.documentElement.classList.add('focus-dark-boot');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Splash inline: se pinta al instante y React lo reemplaza al montar
           con BootSplash, que tiene el mismo layout (icono Focus centrado +
           wordmark arriba + mismos blobs azules). El handoff inline→React es
           invisible porque ambas pantallas son idénticas. -->
      <div id="focus-splash" aria-hidden="true">
        <div class="aurora">
          <div class="blob b1"></div>
          <div class="blob b2"></div>
          <div class="blob b3"></div>
          <div class="fade"></div>
        </div>
        <div class="top-wordmark">Focus</div>
        <div class="center-col">
          <div class="icon-wrap">
            <!-- Icono Focus (espejo de /icons/icon.svg). Inline para
                 renderizar instantáneo sin esperar fetch del PNG. -->
            <svg viewBox="0 0 512 512" aria-hidden="true">
              <defs>
                <linearGradient id="splashIconBg" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#60a5fa"/>
                  <stop offset="55%" stop-color="#1d4ed8"/>
                  <stop offset="100%" stop-color="#1e1b4b"/>
                </linearGradient>
                <radialGradient id="splashIconGlow" cx="0.5" cy="0.5" r="0.5">
                  <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
                  <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
                </radialGradient>
              </defs>
              <rect width="512" height="512" rx="112" fill="url(#splashIconBg)"/>
              <circle cx="256" cy="256" r="180" fill="url(#splashIconGlow)"/>
              <g fill="#ffffff" transform="translate(256 256)">
                <circle r="68"/>
                <g>
                  <rect x="-10" y="-128" width="20" height="40" rx="10"/>
                  <rect x="-10" y="88" width="20" height="40" rx="10"/>
                  <rect x="-128" y="-10" width="40" height="20" rx="10"/>
                  <rect x="88" y="-10" width="40" height="20" rx="10"/>
                  <rect x="-10" y="-128" width="20" height="40" rx="10" transform="rotate(45)"/>
                  <rect x="-10" y="88" width="20" height="40" rx="10" transform="rotate(45)"/>
                  <rect x="-128" y="-10" width="40" height="20" rx="10" transform="rotate(45)"/>
                  <rect x="88" y="-10" width="40" height="20" rx="10" transform="rotate(45)"/>
                </g>
              </g>
            </svg>
          </div>
        </div>
        <p class="loading-hint">preparando tu día…</p>
        <button id="focus-splash-reload" type="button" onclick="location.reload()">Recargar</button>
      </div>
    </div>
    <script>
      // Escape hatch: si a los 6 s el bundle todavía no montó React (el splash
      // sigue visible), mostramos un botón de "Recargar". En iPhone con red
      // pésima o un SW en estado raro el usuario antes se quedaba mirando el
      // orbe sin saber si el celular se había colgado. El botón se autodestruye
      // en cuanto React monta (reemplaza #root).
      (function () {
        var timer = setTimeout(function () {
          var btn = document.getElementById('focus-splash-reload');
          if (btn && document.getElementById('focus-splash')) btn.classList.add('show');
        }, 6000);
        // Si React monta antes, el #focus-splash desaparece por el re-render
        // de createRoot; limpiamos el timer en un MutationObserver simple para
        // no dejar el timer corriendo eternamente.
        try {
          var root = document.getElementById('root');
          var obs = new MutationObserver(function () {
            if (!document.getElementById('focus-splash')) {
              clearTimeout(timer);
              obs.disconnect();
            }
          });
          obs.observe(root, { childList: true, subtree: false });
        } catch (_) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
