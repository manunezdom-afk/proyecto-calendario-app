<!DOCTYPE html>
<html lang="es" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Focus · Calendario con IA</title>
    <meta name="description" content="Tu calendario con Nova, la IA que propone cambios y nunca toca nada sin tu aprobación." />

    <!-- Iconos -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme colors (claro/oscuro) -->
    <meta name="theme-color" content="#0058bc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Focus" />

    <!-- Open Graph (para compartir) -->
    <meta property="og:title" content="Focus · Calendario con IA" />
    <meta property="og:description" content="La IA que propone cambios y nunca toca tu calendario sin tu aprobación." />
    <meta property="og:type" content="website" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- display=block para iconos: evita que aparezca el nombre literal
         ("brightness_high", "business", etc.) antes de que cargue la fuente.
         Texto normal con swap está bien; iconos NO. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block"
      rel="stylesheet"
    />
    <style>
      /* Doble red: si el UA ignora display=block por algún motivo,
         los spans con esta clase se ocultan hasta que main.jsx les
         agrega `.msl-ready` tras `document.fonts.ready`. */
      .material-symbols-outlined {
        visibility: hidden;
      }
      .msl-ready .material-symbols-outlined {
        visibility: visible;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
