<!DOCTYPE html>
<html lang="es" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Focus</title>
    <link rel="icon" href="/apple-touch-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0058bc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Focus" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body { margin: 0; padding: 0; background: #0058bc; }
      #splash {
        position: fixed;
        inset: 0;
        background: #0058bc;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 250ms ease-out;
      }
      #splash .wordmark {
        color: #ffffff;
        font-family: 'Manrope', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 44px;
        letter-spacing: -0.02em;
      }
      .app-ready #splash { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="splash">
      <span class="wordmark">Focus</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
