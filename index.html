<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Focus · Calendario con IA</title>
    <meta name="description" content="Tu calendario con Nova, la IA que propone cambios y nunca toca nada sin tu aprobación." />

    <!-- Iconos -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme colors (claro/oscuro) -->
    <meta name="theme-color" content="#0058bc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Focus" />

    <!-- Open Graph (para compartir) -->
    <meta property="og:title" content="Focus · Calendario con IA" />
    <meta property="og:description" content="La IA que propone cambios y nunca toca tu calendario sin tu aprobación." />
    <meta property="og:type" content="website" />
    <!-- Preconnect para bajar latencia del fetch de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols — se descarga el set completo (display=block para que
         no se filtre el nombre crudo del icono mientras carga). Antes teníamos
         un filtro icon_names=... pero era whitelist y rompía cada icono nuevo
         que agregábamos (ej: view_day del tab Mi Día, add_a_photo del botón de
         foto) porque no estaban en la lista. Mejor descargar todo una vez y
         cachear. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=block"
      rel="stylesheet"
    />
    <style>
      /* Cinturón de seguridad: mientras Material Symbols no haya cargado,
         ocultamos el texto del span (font-size:0) para que nunca se filtren
         los nombres crudos de iconos ("view_day", "add_a_photo", etc).
         Cuando el JS detecta que la fuente cargó, agrega 'ms-loaded' a <html>
         y los iconos vuelven a su tamaño normal. */
      .material-symbols-outlined {
        font-size: 0;
      }
      html.ms-loaded .material-symbols-outlined {
        font-size: inherit;
      }
    </style>
    <script>
      (function () {
        function reveal() {
          document.documentElement.classList.add('ms-loaded');
        }
        if (typeof document !== 'undefined' && document.fonts && document.fonts.load) {
          document.fonts.load('24px "Material Symbols Outlined"')
            .then(reveal).catch(reveal);
          // Fallback: no esperar más de 1.5s. Si la fuente no cargó,
          // mejor mostrar algo (aunque sea texto) que dejar la UI muda.
          setTimeout(reveal, 1500);
        } else {
          reveal();
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
