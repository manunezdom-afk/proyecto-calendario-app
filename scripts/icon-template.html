<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Focus · Icon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1d4ed8; }
    svg { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#60a5fa" />
        <stop offset="55%" stop-color="#1d4ed8" />
        <stop offset="100%" stop-color="#1e1b4b" />
      </linearGradient>
      <radialGradient id="glow" cx="0.3" cy="0.25" r="0.8">
        <stop offset="0%" stop-color="white" stop-opacity="0.25" />
        <stop offset="55%" stop-color="white" stop-opacity="0" />
      </radialGradient>
    </defs>
    <rect width="512" height="512" fill="url(#bg)" />
    <rect width="512" height="512" fill="url(#glow)" />
    <!-- brightness_high sun icon (8-pointed star + circle) centered at 256,256 -->
    <g transform="translate(256 256)" fill="white">
      <!-- 8 rays as rotated rectangles -->
      <g>
        <rect x="-18" y="-150" width="36" height="60" rx="10" />
        <rect x="-18" y="-150" width="36" height="60" rx="10" transform="rotate(45)" />
        <rect x="-18" y="-150" width="36" height="60" rx="10" transform="rotate(90)" />
        <rect x="-18" y="-150" width="36" height="60" rx="10" transform="rotate(135)" />
        <rect x="-18" y="-150" width="36" height="60" rx="10" transform="rotate(180)" />
        <rect x="-18" y="-150" width="36" height="60" rx="10" transform="rotate(225)" />
        <rect x="-18" y="-150" width="36" height="60" rx="10" transform="rotate(270)" />
        <rect x="-18" y="-150" width="36" height="60" rx="10" transform="rotate(315)" />
      </g>
      <!-- Central ring -->
      <circle cx="0" cy="0" r="70" fill="none" stroke="white" stroke-width="22" />
    </g>
  </svg>
</body>
</html>
